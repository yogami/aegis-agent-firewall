# SemaProof Envoy Configuration
# Routes traffic through ext_authz (SemaProof sidecar) before upstream

static_resources:
  listeners:
    - name: ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: upstream_service
                http_filters:
                  # ── SemaProof ext_authz filter ──
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      http_service:
                        server_uri:
                          uri: semaproof:9001
                          cluster: semaproof_ext_authz
                          timeout: 2s
                        path_prefix: /envoy.service.auth.v3.Authorization/
                        authorization_request:
                          allowed_headers:
                            patterns:
                              - exact: content-type
                              - exact: authorization
                          headers_to_add:
                            - key: x-semaproof-source
                              value: envoy
                        authorization_response:
                          allowed_upstream_headers:
                            patterns:
                              - exact: x-semaproof-label
                              - exact: x-semaproof-confidence
                              - exact: x-semaproof-mitre
                              - exact: x-semaproof-layer
                              - exact: x-semaproof-latency-ms
                      failure_mode_allow: false
                      with_request_body:
                        max_request_bytes: 8192
                        allow_partial_message: true
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # ── Upstream service ──
    - name: upstream_service
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: upstream_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: upstream
                      port_value: 5678

    # ── SemaProof ext_authz sidecar ──
    - name: semaproof_ext_authz
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: semaproof_ext_authz
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: semaproof
                      port_value: 9001

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
